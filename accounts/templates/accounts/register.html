<!DOCTYPE html>
<html>

<head>

    <title>Register - JARVIS AI</title>

    <link rel="stylesheet"
    href="/static/css/auth.css">

</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <div class="auth-logo">
            🤖 JARVIS AI
        </div>

        <h1>
            Create Account
        </h1>

        <p>
            Join your personal AI workspace.
        </p>

        {% if error %}

            <div class="error-box">

                {{ error }}

            </div>

        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <input
                type="text"
                name="username"
                placeholder="Username"
                required
            >

            <input
                type="email"
                name="email"
                placeholder="Email"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">

                🚀 Create Account

            </button>

        </form>

        <div class="auth-footer">

            Already have an account?

            <a href="/accounts/login/">

                Login

            </a>

        </div>

    </div>

</div>

</body>
</html>
