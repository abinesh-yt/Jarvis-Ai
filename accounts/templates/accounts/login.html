<!DOCTYPE html>
<html>
<head>
    <title>Login - JARVIS AI</title>
</head>
<body>

    <h1>JARVIS AI Login</h1>
    {% if error %}
        <p>{{ error }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username">
        <br><br>

        <input type="password" name="password" placeholder="Password">
        <br><br>

        <button type="submit">Login</button>
    </form>

</body>
</html>
