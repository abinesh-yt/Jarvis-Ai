<!DOCTYPE html>
<html>

<head>

    <title>Login - JARVIS AI</title>

    <link rel="stylesheet"
    href="/static/css/auth.css">

</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <div class="auth-logo">
            🤖 JARVIS AI
        </div>

        <h1>
            Welcome Back
        </h1>

        <p>
            Login to continue your AI journey.
        </p>

        {% if error %}

            <div class="error-box">

                {{ error }}

            </div>

        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <input
                type="text"
                name="username"
                placeholder="Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">

                🔑 Login

            </button>

        </form>

        <div class="auth-footer">

            Don't have an account?

            <a href="/accounts/register/">

                Create Account

            </a>

        </div>

    </div>

</div>

</body>
</html>
