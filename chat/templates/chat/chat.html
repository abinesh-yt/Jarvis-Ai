{% extends 'base.html' %}

{% block content %}

<div class="page-header">

    <h1>💬 JARVIS Chats</h1>

    <p>
        Continue previous conversations or start a new one.
    </p>

</div>

<a
    href="/chat/new/"
    class="new-chat-btn"
>
    ➕ New Chat
</a>

<div class="chat-grid">

{% for chat in chats %}

<div class="chat-card">

    <a
        href="/chat/{{ chat.id }}/"
        class="chat-link"
    >

        <div class="chat-icon">
            💬
        </div>

        <div class="chat-title">
            {{ chat.title }}
        </div>

    </a>

    <a
        href="{% url 'delete_chat' chat.id %}"
        class="delete-btn"
        onclick="return confirm('Delete this chat?')"
    >
        🗑️
    </a>

</div>

{% empty %}

<div class="empty-card">

    No chats yet 🤖

</div>

{% endfor %}

</div>

{% endblock %}
