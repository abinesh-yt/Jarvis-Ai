{% extends "base.html" %}

{% block content %}

<div class="page-header">


<h1>🤖 Vision AI</h1>

<p>
    Upload images and analyze them using Gemini Vision.
</p>


</div>

<div class="upload-card">


<form
    method="POST"
    enctype="multipart/form-data"
>

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">
        🚀 Upload Image
    </button>

</form>


</div>

<div class="section-title">


<a
    href="{% url 'image_library' %}"
    class="new-chat-btn"
>
    🖼 View Image Library
</a>


</div>

<div class="pdf-grid">

{% for image in images %}


<a
    href="{% url 'image_detail' image.id %}"
    class="pdf-card"
>

    <div class="pdf-icon">

        🤖

    </div>

    <div class="pdf-name">

        {{ image.image.name }}

    </div>

</a>


{% empty %}


<p>No images uploaded yet.</p>


{% endfor %}

</div>

{% endblock %}
