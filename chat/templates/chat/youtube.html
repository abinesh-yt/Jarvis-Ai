{% extends "base.html" %}

{% block content %}

<div class="page-header">

    <h1>🎥 YouTube AI</h1>

    <p>
        Summarize YouTube videos instantly using JARVIS AI.
    </p>

</div>

<div class="upload-card">

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            🚀 Summarize Video
        </button>

    </form>

</div>

{% if summary %}

<div class="result-card">

    <h2>🎥 Video Summary</h2>

    <div class="result-content">

        {{ summary }}

    </div>

</div>

{% endif %}

{% endblock %}
