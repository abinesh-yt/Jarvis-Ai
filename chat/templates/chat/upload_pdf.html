{% extends "base.html" %}

{% block content %}

<div class="page-header">

    <h1>📄 PDF Assistant</h1>

    <p>
        Upload PDFs, generate summaries and ask questions.
    </p>

</div>

<div class="upload-card">

    <form
        method="POST"
        enctype="multipart/form-data"
    >

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            🚀 Upload PDF
        </button>

    </form>

</div>

<div class="section-title">

    <h2>📚 Your PDFs</h2>

</div>

<div class="pdf-grid">

{% for pdf in pdfs %}

    <a
        href="{% url 'pdf_detail' pdf.id %}"
        class="pdf-card"
    >

        <div class="pdf-icon">
            📄
        </div>

        <div class="pdf-name">

            {{ pdf.file.name }}

        </div>

    </a>

{% empty %}

    <p>No PDFs uploaded yet.</p>

{% endfor %}

</div>

{% endblock %}
