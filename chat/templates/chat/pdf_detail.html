{% extends "base.html" %}

{% block content %}

<div class="page-header">


<h1>📄 PDF Assistant</h1>

<p>{{ pdf.file.name }}</p>


</div>

<div class="action-card">


<form method="POST">

    {% csrf_token %}

    <button
        type="submit"
        name="summarize"
    >
        🚀 Generate Summary
    </button>

</form>


</div>

<div class="action-card">


<h2>❓ Ask PDF</h2>

<form method="POST">

    {% csrf_token %}

    <input
        type="text"
        name="question"
        placeholder="Ask anything about this PDF..."
        required
    >

    <button
        type="submit"
        name="ask"
    >
        🤖 Ask AI
    </button>

</form>


</div>

{% if summary %}

<div class="result-card">


<h2>🤖 Summary</h2>

<div class="result-content">

    {{ summary }}

</div>


</div>

{% endif %}

{% if answer %}

<div class="result-card">


<h2>💡 Answer</h2>

<div class="result-content">

    {{ answer }}

</div>


</div>

{% endif %}

<div class="result-card">


<h2>📚 Extracted Text</h2>

<pre>


{{ text }}


</pre>

</div>

{% endblock %}
